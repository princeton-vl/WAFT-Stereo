  CROP_SIZE: [540, 960]
  TEST: ("things",)
TEST:
  EVAL_PERIOD: 10000
  EVAL_THRESH: (['1.0', '3.0'],)
  EVAL_MAX_DISP: [null,]
  EVAL_ONLY_VALID: (True,)
SOLVER:
