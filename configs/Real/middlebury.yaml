    TYPE: "dav2"
    ARCH: "vitl"
    LORA_RANK: 8
    LORA_ALPHA: 16
  ITERATIVE_MODULE:
    TASK: ['delta', 'delta', 'delta', 'delta']
    DELTA_ITER:
      TYPE: "vit"
      ARCH: "vits"
      PATCH_SIZE: 8
    PROP_ITER:
      TYPE: "vit"
      ARCH: "vits"
      PATCH_SIZE: 8
